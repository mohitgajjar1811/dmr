{% extends 'dashboard/base_admin.html' %}

{% block title %}Send Promotional Email | Virja Admin{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Send Promotional Email</h2>
        <a href="{% url 'dashboard:newsletter_list' %}" class="text-gray-600 hover:text-gray-800">
            <i class="fas fa-arrow-left"></i> Back to Subscribers
        </a>
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                    {{ form.subject }}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Message Content</label>
                    <div class="prose max-w-none">
                        {{ form.message }}
                    </div>
                    <p class="text-xs text-gray-500 mt-1">Design your email content here.</p>
                </div>
            </div>

            <div class="mt-8 flex justify-end">
                <button type="submit"
                    onclick="return confirm('Are you sure you want to send this email to all active subscribers?');"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-8 rounded shadow transition transform hover:scale-105">
                    <i class="fas fa-paper-plane mr-2"></i> Send to All Subscribers
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
