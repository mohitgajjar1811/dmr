{% extends 'dashboard/base_admin.html' %}

{% block title %}Password Reset Complete | Virja Admin{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded shadow-lg p-6 mt-10 text-center">
    <div class="text-green-500 text-5xl mb-4">
        <i class="fas fa-check-circle"></i>
    </div>
    <h1 class="text-2xl font-bold mb-4 text-gray-800">Password Changed!</h1>
    <p class="text-gray-600 mb-6">Your password has been set. You may go ahead and log in now.</p>

    <a href="{% url 'dashboard:login' %}"
        class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition">
        Log In
    </a>
</div>
{% endblock %}
