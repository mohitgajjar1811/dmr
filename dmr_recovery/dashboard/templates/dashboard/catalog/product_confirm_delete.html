{% extends 'dashboard/base_admin.html' %}

{% block title %}Delete Product | Virja Admin{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-sm border border-gray-100 p-8 text-center">
    <div class="text-red-500 text-5xl mb-4">
        <i class="fas fa-exclamation-circle"></i>
    </div>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Are you sure?</h2>
    <p class="text-gray-600 mb-8">
        You are about to delete the product <strong>"{{ product.name }}"</strong>. This action cannot be undone.
    </p>

    <form method="POST" class="flex justify-center gap-4">
        {% csrf_token %}
        <a href="{% url 'dashboard:product_list' %}"
            class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-6 rounded transition">
            Cancel
        </a>
        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded transition">
            Yes, Delete it
        </button>
    </form>
</div>
{% endblock %}
