<!-- Download Lead Capture Modal & AlpineJS Script -->
<div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50" x-cloak x-transition.opacity>
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4 overflow-hidden relative" @click.away="showModal = false">
        
        <!-- Header -->
        <div class="bg-primary px-6 py-4 border-b flex justify-between items-center">
            <h3 class="text-lg font-bold text-white tracking-wide">Tell Us About Yourself</h3>
            <button @click="showModal = false" class="text-white hover:text-gray-200 transition">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <!-- Body -->
        <div class="p-6">
            <p class="text-gray-600 text-sm mb-5 text-center leading-relaxed">
                Please provide your details below to download <br>
                <strong x-text="currentItemTitle" class="text-gray-900 mt-1 inline-block"></strong>
            </p>

            <form @submit.prevent="submitLead" class="space-y-4">
                
                <!-- Error Message -->
                <div x-show="errorMsg" class="bg-red-50 text-red-600 p-2 rounded text-sm text-center border border-red-200" x-text="errorMsg" x-cloak></div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Name *</label>
                    <input type="text" x-model="name" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition" placeholder="John Doe" required>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Email *</label>
                    <input type="email" x-model="email" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition" placeholder="john@example.com" required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Phone Number *</label>
                    <input type="tel" x-model="phone" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition" placeholder="+91 9876543210" required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Company Name</label>
                    <input type="text" x-model="company_name" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition" placeholder="Your Company">
                </div>
                
                <div class="pt-2">
                    <button type="submit" :disabled="submitting" class="w-full bg-secondary hover:bg-red-700 text-white font-bold py-2.5 rounded shadow-lg shadow-red-200 transition-all flex justify-center items-center gap-2">
                        <span x-show="!submitting">Submit & Download <i class="fas fa-download ml-1 text-xs"></i></span>
                        <span x-show="submitting">Processing <i class="fas fa-circle-notch fa-spin ml-1"></i></span>
                    </button>
                    <p class="text-xs text-center text-gray-400 mt-3"><i class="fas fa-lock mr-1"></i> Your information is secure with us.</p>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function downloadLead() {
    return {
        showModal: false,
        name: '',
        email: '',
        phone: '',
        company_name: '',
        currentItemTitle: '',
        currentItemType: '',
        currentDownloadUrl: '',
        currentActionType: '', // 'view' or 'download'
        submitting: false,
        errorMsg: '',

        triggerDownload(url, title, type, actionType = 'download') {
            if (localStorage.getItem('downloadLeadSubmitted')) {
                // Already submitted before
                if (actionType === 'download') {
                    // creating an invisible link to force download if needed
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = '';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                } else {
                    window.open(url, '_blank');
                }
                return;
            }
            this.currentDownloadUrl = url;
            this.currentItemTitle = title;
            this.currentItemType = type;
            this.currentActionType = actionType;
            this.showModal = true;
            this.errorMsg = '';
        },

        async submitLead() {
            if (!this.name || !this.email || !this.phone) {
                this.errorMsg = 'Please fill all required fields.';
                return;
            }
            this.submitting = true;
            
            try {
                let formData = new FormData();
                formData.append('name', this.name);
                formData.append('email', this.email);
                formData.append('phone', this.phone);
                formData.append('company_name', this.company_name);
                formData.append('item_title', this.currentItemTitle);
                formData.append('item_type', this.currentItemType);

                let response = await fetch('{% url "capture_download_lead" %}', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });

                if (response.ok) {
                    localStorage.setItem('downloadLeadSubmitted', 'true');
                    this.showModal = false;
                    
                    // Trigger download or view
                    if (this.currentActionType === 'download') {
                        const a = document.createElement('a');
                        a.href = this.currentDownloadUrl;
                        a.download = '';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    } else {
                        window.open(this.currentDownloadUrl, '_blank');
                    }
                } else {
                    let data = await response.json();
                    this.errorMsg = data.message || 'There was an error saving your data.';
                }
            } catch(e) {
                this.errorMsg = 'Failed to submit. Please check your network connection.';
            } finally {
                this.submitting = false;
            }
        }
    }
}
</script>
